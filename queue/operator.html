<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Окно сотрудника</title>
<link rel="stylesheet" href="/queue/css/operator.css">
</head>

<body>

<div id="toast-notification" style="display:none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--danger); color: white; padding: 15px 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; font-weight: 600;">
    Закончите с текущим клиентом!
</div>

<header class="header-panel">
    <div class="button-group">
        <button id="btn-start" class="btn-success" onclick="changeWindowStatus('online')">ОНЛАЙН</button>
        <button id="btn-stop" class="btn-outline" onclick="changeWindowStatus('break')">ПЕРЕРЫВ</button>
		
		<div id="status-info-block" class="info-status" style="margin: 0; padding: 6px 14px; background: #f1f5f9; border-radius: 20px; font-size: 0.95rem;">
			<div id="status-dot" class="dot"></div>
			<span id="status-text" style="font-weight: 700;">Загрузка...</span>
		</div>

    </div>
    
    <div class="button-group">
        <button class="btn-outline" onclick="logout()">ВЫЙТИ</button>
    </div>
</header>

<main class="main-layout">
	<section class="glass-card" style="display:flex; flex-direction:column; overflow:hidden;">
		<h3 style="margin-top:0">Очередь</h3>
		<div id="queue-list" class="queue-list" style="flex:1; overflow-y:auto; min-height:0;">Загрузка...</div>
		<div style="flex-shrink:0; padding-top:16px; border-top:1px solid #e2e8f0;">
			<span style="font-size:0.95rem; text-transform:uppercase; font-weight:800; color:var(--text-main); letter-spacing:0.5px;">Обслужено сегодня:</span>
			<span id="served-today-count" style="font-size:1.8rem; font-weight:700; color:var(--primary); margin-left:10px;">—</span>
		</div>
	</section>

    <section class="glass-card display-zone">
        <div class="ticket-label">ТЕКУЩИЙ КЛИЕНТ</div>
        <div id="current" class="ticket-number">--</div>
		<div id="current-service" class="current-service">—</div>
        
		
        <div class="button-group" style="margin-top: 40px; justify-content: center;">
            <button id="next-btn" class="btn-primary" onclick="callNext()" style="padding: 20px 40px; font-size: 1.1rem;">ВЫЗВАТЬ СЛЕДУЮЩЕГО</button>
            <button class="btn-danger" onclick="finishCurrent()">ЗАВЕРШИТЬ ОБСЛУЖИВАНИЕ</button>
        </div>

        <div class="button-group" style="margin-top: 15px; justify-content: center;">
            <button class="btn-outline" id="recall-btn" onclick="recallCurrent()">ПОВТОРИТЬ ВЫЗОВ</button>
            <button class="btn-outline" id="cancel-btn" onclick="cancelCurrent()">ОТМЕНИТЬ ВЫЗОВ</button>
			<button class="btn-outline" onclick="promptCallByNumber()">ВЫЗВАТЬ ПО НОМЕРУ</button>
            <button class="btn-outline" onclick="showRedirect()">ПЕРЕНАПРАВИТЬ</button>
        </div>

		<div id="redirect-panel" style="display:none; margin-top:20px; background: #f8f9fc; padding: 15px; border-radius: 12px;">
			<select id="redirect-service" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;"></select>
			<button class="btn-primary" onclick="confirmRedirect()">ОК</button>
			<button class="btn-outline" onclick="cancelRedirect()">ОТМЕНА</button>
		</div>
		
		<div class="bottom-controls">
			<div class="auto-call-group">
				<div class="auto-call-container">
					<label class="switch">
						<input type="checkbox" id="auto-call-toggle">
						<span class="slider round"></span>
					</label>
					<span class="auto-call-label">Автовызов</span>
				</div>
				<div id="auto-call-status" class="auto-call-status-text"></div>
			</div>
		</div>

    </section>

	<section class="glass-card">
		<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; height: 32px;">
			<h3 style="margin: 0; padding: 0; line-height: 1;">Информация</h3>
		</div>

		<div id="operator-info" style="line-height: 1.6;"></div>
	</section>
</main>

<script src="/queue/js/config.js"></script>
<script src="/queue/js/operator.js"></script>

</body>
</html>
