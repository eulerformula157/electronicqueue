<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%2328a745'/%3E%3Ccircle cx='5' cy='8' r='2' fill='white'/%3E%3Cpath d='M10,4 C12,6 12,10 10,12' stroke='white' stroke-width='2' fill='none'/%3E%3C/svg%3E">
    <meta charset="UTF-8">
    <title>Табло очереди Приемной комиссии</title>
    <link rel="stylesheet" href="/queue/css/style.css">
</head>
<body class="board-page">

<h1 id="title">Табло очереди Приемной комиссии</h1>
<div id="clock-container" class="clock-container"></div>

<div class="board-wrapper board-wrapper-with-waiting">
    <section class="board-section board-section-called">
        <div class="board-section-header">
            <span>Вызванные</span>
            <span id="called-page-indicator" class="board-page-indicator"></span>
        </div>
        <div class="board" id="board"></div>
        <div id="called-page-dots" class="board-page-dots"></div>
    </section>

    <section class="board-section board-section-waiting">
        <div class="board-section-header">
            <span>Ожидают</span>
            <span id="waiting-page-indicator" class="board-page-indicator"></span>
        </div>
        <div class="waiting-board" id="waiting-board"></div>
        <div id="waiting-page-dots" class="board-page-dots"></div>
    </section>
</div>

<div class="status-indicator" id="ws-status">WS: connecting...</div>

<script src="/queue/js/config.js"></script>
<script src="/queue/js/tts.js"></script>
<script src="/queue/js/board.js"></script>

</body>
</html>
