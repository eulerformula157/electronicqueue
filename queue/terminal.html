<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%2328a745'/%3E%3Ccircle cx='5' cy='8' r='2' fill='white'/%3E%3Cpath d='M10,4 C12,6 12,10 10,12' stroke='white' stroke-width='2' fill='none'/%3E%3C/svg%3E">
    <meta charset="UTF-8">
    <title>Терминал очереди</title>
    <link rel="stylesheet" href="/queue/css/terminal.css?v=1.1">
	
<style>
        /* Стили только для таллона, почему-то через terminal.css не хочет работать */
        #print-receipt {
            display: none; /* Скрыт на экране терминала */
            width: 280px;
            text-align: center;
            font-family: 'Arial Black', Gadget, sans-serif;
            color: #000 !important;
            background: #fff !important;
            line-height: 1.2;
            padding: 10px;
        }

        .receipt-header-line {
            border-top: 4px solid #000 !important; 
            margin-bottom: 10px;
        }

        .org-name {
            font-size: 18px; 
            font-weight: 900; 
            text-transform: uppercase;
        }

        .ticket-label {
            font-size: 20px; 
            margin-bottom: 10px;
        }

        #receipt-number {
            font-size: 100px; 
            font-weight: 900; 
            line-height: 0.9; 
            margin: 5px 0; 
            border: 5px solid #000 !important; 
            padding: 10px 0;
        }

        #receipt-service {
            font-size: 20px; 
            font-weight: bold; 
            margin: 10px 0; 
            text-transform: uppercase;
        }

        #receipt-wait-count {
            font-size: 18px; 
            font-weight: bold; 
            margin: 10px 0; 
            padding: 5px; 
            border: 1px solid #000 !important;
        }

        .dashed-line {
            border-top: 2px dashed #000 !important; 
            margin: 15px 0;
        }

        .notice-text {
            font-size: 14px; 
            text-align: left; 
            font-family: Arial, sans-serif;
        }

        #receipt-date {
            font-size: 14px; 
            margin-top: 15px;
        }

        .footer-spacer {
            height: 100px;
        }

        /* Специфические правила для вывода на принтер */
        @media print {
            body * { 
                visibility: hidden !important; 
            }
            #print-receipt, #print-receipt * { 
                visibility: visible !important; 
            }
            #print-receipt {
                display: block !important; /* Гарантируем появление блока при печати */
                position: absolute;
                left: 45px;
                top: 0;
                width: 80% !important;
                margin: 0;
                padding: 0;
            }
            @page {
                margin: 0;
            }
        }
</style>	
	
</head>
<body>

    <audio id="silentAudio" loop>
        <source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3" type="audio/mp3">
    </audio>

<div id="terminal-auth-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#f4f4f9; z-index:10000; flex-direction:column; align-items:center; justify-content:center; font-family: sans-serif;">
    <div style="background:white; padding:40px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); text-align:center; width: 350px;">
        <h2 style="margin-bottom:20px; color:#333;">Активация терминала</h2>
        <input type="text" id="term-login" placeholder="Логин терминала" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
        <input type="password" id="term-password" placeholder="Пароль" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
        <button onclick="handleTerminalManualLogin()" id="term-auth-btn" style="width:100%; padding:12px; background:#28a745; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Войти</button>
        <p id="term-auth-error" style="color:red; margin-top:15px; font-size:14px;"></p>
    </div>
</div>


    <h1>Выберите услугу</h1>
    
    <div id="services">Загрузка услуг...</div>

    <div id="ticket-notice">
        <span id="ticket-message"></span>
        <div class="timer" id="ticket-timer"></div>
    </div>

    <div id="print-mode-badge" class="print-mode-badge">Печать: ВКЛ</div>

    <div id="print-receipt">
        <div class="receipt-header-line"></div>
        <div class="org-name">Приемная комиссия</div>
        <div class="ticket-label">ВАШ НОМЕР</div>
        <div id="receipt-number"></div>
        <div id="receipt-service"></div>
        <div id="receipt-wait-count"></div>
        <div class="dashed-line"></div>
        <div class="notice-text">
            <strong>ВНИМАНИЕ:</strong> После вызова на табло у вас есть 5 минут...
        </div>
        <div id="receipt-date"></div>
        <div class="footer-spacer"></div>
    </div>



    <script src="/queue/js/config.js"></script>
    <script src="/queue/js/terminal.js"></script>
</body>
</html>
