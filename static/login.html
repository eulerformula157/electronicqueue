<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вход в систему</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Контейнер формы */
.login-box {
    background: #f2f2f2;   /* светло-серый прямоугольник */
    padding: 40px 30px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    text-align: center;
    width: 350px;
}

/* Заголовок */
.login-box h2 {
    margin: 0 0 30px 0;
    color: #333;
    font-size: 20px;
}

/* Поля ввода */
.login-box input[type="text"],
.login-box input[type="password"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
    box-sizing: border-box;
}

/* Кнопка */
.login-box button {
    width: 100%;
    padding: 12px;
    background: #e05d1b;
    color: white;
    font-size: 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.3s;
}

.login-box button:hover {
    background: #1490a3;
}

/* Сообщение об ошибке */
#login-error {
    color: red;
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>Вход в СУО Приемной комиссии</h2>
    <input type="text" id="login" placeholder="Логин">
    <input type="password" id="password" placeholder="Пароль">
    <button onclick="submitLogin()">Войти</button>
    <div id="login-error"></div>
</div>

<script>
const API_URL = "http://localhost:8000";

async function submitLogin() {
    const login = document.getElementById("login").value;
    const password = document.getElementById("password").value;

    fetch(`${API_URL}/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({login, password})
    })
    .then(res => {
        if (!res.ok) throw new Error("Неверный логин или пароль");
        return res.json();
    })
	.then(data => {
		console.log("LOGIN RESPONSE:", data);

		sessionStorage.setItem("session_id", data.session_id);

		console.log("SESSION SAVED:", sessionStorage.getItem("session_id"));

		window.location.href = "/static/operator.html";
	})
    .catch(err => {
        document.getElementById("login-error").textContent = err.message;
    });
}
</script>

</body>
</html>
