<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>

<div class="login-box">
    <h2>Вход в СУО приемной комиссии</h2>
    <form id="login-form" onsubmit="return false;">
        <input type="text" id="login" placeholder="Логин" required autocomplete="username">
        <input type="password" id="password" placeholder="Пароль" required autocomplete="current-password">
        <button type="submit" id="login-btn">Войти</button>
    </form>
    <div id="login-error"></div>
</div>

<script src="/static/js/config.js"></script>
<script src="/static/js/login.js"></script>

</body>
</html>
