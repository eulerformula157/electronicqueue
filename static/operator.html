<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Окно сотрудника</title>

<style>
body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    background: #f2f2f2;
    color: #333;
}

/* ===== Верхний заголовок ===== */
h1 {
    text-align: center;
    margin: 20px 0;
    font-weight: 600;
}

/* ===== Общий контейнер ===== */
.main-container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 40px;
    margin-top: 20px;
}

/* ===== Левая панель (очередь) ===== */
#queue-panel {
    width: 260px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    overflow: hidden;
}

#queue-panel h3 {
    margin: 0;
    padding: 15px;
    background: white;
    border-bottom: 1px solid #eee;
}

#queue-list {
    max-height: calc(100vh - 320px);
    overflow-y: auto;
    padding: 15px;
}


#queue-panel::-webkit-scrollbar-thumb {
    position: sticky;
    background: #cfcfcf;
    border-radius: 4px;
}

#queue-panel::-webkit-scrollbar-thumb:hover {
    position: sticky;
    background: #b5b5b5;
}



.queue-item {
    padding: 10px;
    margin-bottom: 8px;
    background: #f7f7f7;
    border-radius: 6px;
    font-weight: 600;
}

/* ===== Центральная часть ===== */
.center-panel {
    text-align: center;
}

#current {
    margin: 20px 0;
    font-size: 36px;
    font-weight: 600;
}

/* ===== Кнопки ===== */
button {
    padding: 12px 25px;
    font-size: 16px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #e0e0e0;
    transition: 0.2s ease;
}

button:hover {
    background: #d5d5d5;
}

button.primary {
    background: #2d89ef;
    color: white;
}

button.primary:hover {
    background: #1b6fd8;
}

button.danger {
    background: #d9534f;
    color: white;
}

button.danger:hover {
    background: #c9302c;
}

/* ===== Правая панель (оператор) ===== */
#operator-info {
    width: 280px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    font-size: 15px;
}

#operator-info b {
    display: inline-block;
    width: 140px;
}

.status-btn {
    padding: 8px 18px;
    font-size: 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    margin-right: 8px;
    font-weight: 600;
    transition: 0.2s ease;
}

//* Старт (например, поменяем на синий) */
.start {
    background: #3498db; /* Новый цвет фона */
    color: white;
}

.start:hover {
    background: #29b97b; /* Новый цвет при наведении */
}

/* Стоп (например, поменяем на серый/оранжевый) */
.stop {
    background: #f39c12; /* Новый цвет фона */
    color: white;
}

.stop:hover {
    background: #e67e22; /* Новый цвет при наведении */
}

/* активная кнопка */
.status-active {
    box-shadow: 0 0 0 3px rgba(0,0,0,0.3) inset; /* Толщина и прозрачность рамки */
    filter: brightness(85%); /* Чуть затемняем активную кнопку */
    transform: scale(0.95);    /* Немного уменьшаем её при нажатии */
}

/* ===== Строка 1 (статус) ===== */
.top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px 10px 40px;
}

.status-buttons {
    display: flex;
    gap: 15px;
}

/* Добавьте это к вашим стилям .start и .stop */
.logout {
    background: #963930; /* Ваш исходный серый цвет */
    color: white;
}

.logout:hover {
    background: #661911; /* Чуть темнее при наведении для интерактивности */
}

/* ===== Строка 2 (действия) ===== */
.action-row {
    display: flex;
    gap: 15px;
    padding: 10px 40px 20px 40px;
    flex-wrap: wrap; /* ВАЖНО — кнопки можно добавлять */
}

/* ===== Рабочая зона ===== */
.workspace {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px 40px;
}

/* Центр */
.center-panel {
    flex: 1;
    text-align: center;
}

/* Левая панель */
#queue-panel {
    width: 260px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

/* Правая панель */
#operator-info {
    width: 280px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}
}
</style>
</head>

<body>
<!-- ===== Первая строка кнопок ===== -->
<div class="top-row">

    <div class="status-buttons">
        <button id="btn-start" class="status-btn start" onclick="changeWindowStatus('online')">
            НАЧАТЬ
        </button>

        <button id="btn-stop" class="status-btn stop" onclick="changeWindowStatus('break')">
            ПЕРЕРЫВ
        </button>
    </div>

    <button class="status-btn logout" onclick="logout()">ВЫЙТИ</button>

</div>

<!-- ===== Вторая строка кнопок ===== -->
<div class="action-row">
    <button class="primary" onclick="callNext()">Следующий клиент</button>
    <button class="danger" onclick="finishCurrent()">Завершить</button>
    <button onclick="showRedirect()">Перенаправить</button>
</div>

<!-- ===== Основная рабочая зона ===== -->
<div class="workspace">

	<div id="queue-panel">
		<h3>Очередь</h3>
		<div id="queue-list">Загрузка...</div>
	</div>

    <div class="center-panel">
        <div id="current">Окно свободно</div>

        <div id="redirect-panel" style="display:none; margin-top:10px;">
            <select id="redirect-service"></select>
            <button onclick="confirmRedirect()">Подтвердить</button>
        </div>
    </div>

    <div id="operator-info">
        Загрузка информации...
    </div>

</div>
</div>

<script>
const API_URL = "http://localhost:8000"; 

let sessionId = sessionStorage.getItem("session_id")

const panel = document.getElementById("queue-list");

async function init() {
    const sessionToken = sessionStorage.getItem("session_id");
    if (!sessionToken) {
        window.location.href = "/static/login.html";
        return;
    }

    try {
        // Получаем ID оператора
        const res = await fetch(`${API_URL}/auth/me`, {
            headers: { "session-id": sessionToken } // исправлено
        });

        if (!res.ok) {
            window.location.href = "/static/login.html";
            return;
        }

        const data = await res.json();
        operatorId = data.operator_id; 

        // После этого можно безопасно запускать WebSocket
        //initWebSocket();

        // Параллельно можно загружать очередь, услуги и инфо
        loadOperatorInfo();
        //loadQueue();
        //loadAllServices();

    } catch (e) {
        console.error(e);
        window.location.href = "/static/login.html";
    }
	
	loadCurrentTicket();
}

function initWebSocket() {
    const socket = new WebSocket(`ws://localhost:8000/ws/terminal`);

	socket.onopen = () => {
		console.log("WebSocket подключен");
	};

	socket.onmessage = function(event) {
		const data = JSON.parse(event.data);

		if (data.type === "services_updated") {
			// обновляем информацию об операторе сразу при изменении окна
			loadOperatorInfo();
		}    
		
		if (data.type === "queue_updated") {
			// обновляем информацию об очереди сразу при изменении
			loadQueue();
		}
	};

	socket.onclose = () => {
		console.log("WebSocket отключен");
	};
}

// Запускаем инициализацию
init();
initWebSocket();
//loadOperatorInfo();
loadQueue();
loadAllServices();
// ==================== WebSocket ====================


let currentTicketId = null;
let allServices = [];


/* =========================
   Загрузка информации об операторе
========================= */
async function loadOperatorInfo() {
    try {
        const operatorRes = await fetch(`${API_URL}/operators/`);
        const operators = await operatorRes.json();
        const operator = operators.find(o => o.id === operatorId);

        if (!operator) {
            document.getElementById("operator-info").textContent = "Оператор не найден";
            return;
        }

        const windowsRes = await fetch(`${API_URL}/windows/`);
        const windows = await windowsRes.json();
        const windowObj = windows.find(w => w.id === operator.window_id);

        const windowServicesRes = await fetch(`${API_URL}/window-services/`);
        const windowServices = await windowServicesRes.json();

        const servicesRes = await fetch(`${API_URL}/services/`);
        const services = await servicesRes.json();

        const serviceIds = windowServices
            .filter(ws => ws.window_id === operator.window_id)
            .map(ws => ws.service_id);

        const serviceNames = services
            .filter(s => serviceIds.includes(s.id))
            .map(s => s.name);

        // ------------------------
        // Выводим всю информацию, просто status из окна
        // ------------------------
        document.getElementById("operator-info").innerHTML = `
            <b>Оператор:</b> ${operator.name} <br>
            <b>Окно:</b> ${windowObj ? windowObj.name : "не назначено"} <br>
            <b>Статус:</b> ${windowObj ? windowObj.status : "нет данных"}<br>
            <b>Оказываемые услуги:</b><br> ${serviceNames.join("<br>")}
        `;

    } catch (e) {
        console.error(e);
        document.getElementById("operator-info").textContent = "Ошибка загрузки данных";
    }
}



/* =========================
   Загрузка очереди оператора
========================= */
async function loadQueue() {
    try {
        const res = await fetch(`${API_URL}/tickets/my-queue`, {
            headers: { "session-id": sessionId }
        });

        const tickets = await res.json();

        const panel = document.getElementById("queue-list");

        if (!tickets.length) {
            panel.innerHTML = "Нет ожидающих";
            return;
        }

        panel.innerHTML = tickets.map(t =>
            `<div class="queue-item">№ ${t.number}</div>`
        ).join("");

    } catch (e) {
        console.error(e);
    }
}

/* =========================
   Вызов следующего клиента
========================= */
async function callNext() {
	const stopBtn = document.getElementById("btn-stop");
    const isBreak = stopBtn.classList.contains("status-active");

    // 2. Если статус 'break', меняем его на 'online' перед вызовом
    if (isBreak) {
        await changeWindowStatus('online');
    }
	
	const res = await fetch(`${API_URL}/tickets/next`, {
		method: "POST",
		headers: {
			"Content-Type": "application/json",
			"session-id": sessionId
		}
	});

    const ticket = await res.json();

    if (ticket.detail) {
        document.getElementById("current").textContent = ticket.detail;
        currentTicketId = null;
    } else {
        document.getElementById("current").textContent =
            "Текущий клиент: " + ticket.number;

        currentTicketId = ticket.id;
    }

    loadQueue();
}

/* =========================
   Завершение обслуживания
========================= */
async function finishCurrent() {
    try {
        const res = await fetch(`${API_URL}/tickets/finish`, {
            method: "POST",
            headers: {
					"Content-Type": "application/json",
					"session-id": sessionId
				}
        });

        const result = await res.json();

        if (result.detail) {
            alert(result.detail); // например, "Нет текущего клиента"
            document.getElementById("current").textContent = "Окно свободно";
        } else {
            document.getElementById("current").textContent = "Окно свободно";
        }

        loadQueue(); // обновляем очередь

    } catch (e) {
        console.error(e);
        alert("Ошибка при завершении обслуживания");
    }
}

/* =========================
   Загрузка всех услуг
========================= */
async function loadAllServices() {
    try {
        const res = await fetch(`${API_URL}/services/`);
        allServices = await res.json();
    } catch (e) {
        console.error("Ошибка загрузки услуг:", e);
    }
}

/* =========================
   Показ панели перенаправления
========================= */
function showRedirect() {
	currentTicketId = loadCurrentTicket();

    if (!currentTicketId) {
        alert("Нет текущего клиента");
        return;
    }

    const select = document.getElementById("redirect-service");
    select.innerHTML = "";

    allServices.forEach(service => {
        const option = document.createElement("option");
        option.value = service.id;
        option.textContent = service.name;
        select.appendChild(option);
    });

    document.getElementById("redirect-panel").style.display = "block";
}

/* =========================
   Подтверждение перенаправления
========================= */
async function confirmRedirect() {
    const newServiceId = document.getElementById("redirect-service").value;

    if (!newServiceId) {
        alert("Выберите услугу");
        return;
    }

    if (!confirm("Вы уверены, что хотите перенаправить клиента?")) {
        return;
    }

    const res = await fetch(`${API_URL}/tickets/redirect`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            ticket_id: currentTicketId,
            new_service_id: parseInt(newServiceId)
        })
    });

    const result = await res.json();

    if (result.detail) {
        alert(result.detail);
    } else {
        alert("Билет перенаправлен");
        document.getElementById("current").textContent = "Окно свободно";
        currentTicketId = null;
        document.getElementById("redirect-panel").style.display = "none";
        loadQueue();
    }
}

async function changeWindowStatus(newStatus) {
    try {
        const sessionId = sessionStorage.getItem("session_id");
        if (!sessionId) {
            alert("Сессия не найдена. Перезайдите.");
            window.location.href = "/static/login.html";
            return;
        }

        const operatorRes = await fetch(`${API_URL}/operators/`, {
            headers: { "session-id": sessionId }
        });
        const operators = await operatorRes.json();
        const operator = operators.find(o => o.id === operatorId);

        if (!operator || !operator.window_id) {
            alert("Окно не назначено");
            return;
        }

        // --- Добавленная проверка ---
        // Получаем объект окна, чтобы узнать текущий статус
        const windowsRes = await fetch(`${API_URL}/windows/`);
        const windows = await windowsRes.json();
        const windowObj = windows.find(w => w.id === operator.window_id);

        if (windowObj && windowObj.status === newStatus) {
            console.log("Статус уже установлен, пропускаем запрос.");
            return; // Прерываем выполнение функции
        }
        // ---------------------------

        const res = await fetch(`${API_URL}/windows/update-status`, {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "session-id": sessionId
            },
            body: JSON.stringify({
                window_id: operator.window_id,
                status: newStatus
            })
        });

        if (!res.ok) {
            const err = await res.json();
            alert(err.detail || "Ошибка при смене статуса");
            return;
        }

        const result = await res.json();
        updateStatusButtons(result.status); 

    } catch (e) {
        console.error(e);
        alert("Ошибка при смене статуса");
    }
}

function updateStatusButtons(status) {
    const startBtn = document.getElementById("btn-start");
    const stopBtn = document.getElementById("btn-stop");

    startBtn.classList.remove("status-active");
    stopBtn.classList.remove("status-active");

    if (status === "online") {
        startBtn.classList.add("status-active");
    } else {
        stopBtn.classList.add("status-active");
    }
}

async function loadCurrentTicket() {
    try {
        const res = await fetch(`${API_URL}/tickets/current`, {
            headers: { "session-id": sessionId }
        });

        const data = await res.json();

        if (data.ticket) {

            currentTicketId = data.ticket.id;

            document.getElementById("current").textContent =
                "Текущий клиент: " + data.ticket.number;

        } else {

            currentTicketId = null;
            document.getElementById("current").textContent = "Окно свободно";

        }

    } catch (e) {
        console.error(e);
    }
}


async function logout() {
    if (!confirm("Вы уверены, что хотите завершить работу?")) return;

    try {
        await fetch(`${API_URL}/logout`, {
            method: "POST",
            headers: { "session-id": sessionStorage.getItem("session_id") }
        });
        
        // Очищаем локальное хранилище и перенаправляем
        sessionStorage.removeItem("session_id");
        window.location.href = "/static/login.html";
    } catch (e) {
        console.error("Ошибка при выходе:", e);
        // Даже если ошибка сети, принудительно выкидываем
        window.location.href = "/static/login.html";
    }
}

let isNavigating = false;

window.addEventListener("beforeunload", () => {
    // Если пользователь переходит по ссылке или обновляет страницу, 
    // мы не хотим убивать сессию, если он вернется через секунду
    if (!isNavigating) {
        navigator.sendBeacon(`${API_URL}/logout`, JSON.stringify({
            session_id: sessionStorage.getItem("session_id")
        }));
    }
});

// Добавьте это ко всем ссылкам/кнопкам, которые ведут на другие страницы
document.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => isNavigating = true);
});

let isClosingTab = false;

// если страница была обновлена — убираем флаг
if (sessionStorage.getItem("refresh")) {
    sessionStorage.removeItem("refresh");
}

// отслеживаем F5 / Ctrl+R
window.addEventListener("keydown", function (event) {

    if (event.key === "F5" || (event.ctrlKey && event.key === "r")) {
        isClosingTab = true;
        sessionStorage.setItem("refresh", "true");
    }

});

// переход по ссылкам
document.addEventListener("click", function (event) {

    const link = event.target.closest("a");

    if (link) {
        isClosingTab = true;
    }

});

// основной обработчик закрытия страницы
window.addEventListener("beforeunload", function () {

    // если это обновление страницы — ничего не делаем
    if (isClosingTab || sessionStorage.getItem("refresh")) {
        return;
    }

    // если вкладку закрывают
    if (sessionId) {

        navigator.sendBeacon(
            `${API_URL}/logout`,
            JSON.stringify({ session_id: sessionId })
        );

    }

});

</script>

</body>
</html>
