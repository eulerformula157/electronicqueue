<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Терминал очереди</title>

<style>
/* --- Константы --- */
:root {
    --button-height: 140px;
    --button-width: 300px;
    --button-font-size: 18px;
    --button-gap: 20px;
    --main-bg: #f4f6f8;
    --button-bg: #e05d1b;
    --button-hover-bg: #1490a3;
    --text-color: #333;
    --notice-bg: #333;
}

/* --- Страница --- */
body {
    margin: 0;
    padding: 40px 20px;
    font-family: Arial, sans-serif;
    text-align: center;
    background: var(--main-bg);
    min-height: 100vh;
    box-sizing: border-box;
}

h1 {
    margin-bottom: 40px;
    color: var(--text-color);
    font-size: 28px;
}

/* --- Контейнер кнопок --- */
#services {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: var(--button-gap);
    max-width: 1000px;
    margin: 0 auto 30px auto;
}

/* --- Кнопки --- */
button.service-btn {
    width: var(--button-width);
    height: var(--button-height);
    font-size: var(--button-font-size);
    background: var(--button-bg);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    transition: all 0.2s ease;
}

button.service-btn:hover {
    background: var(--button-hover-bg);
    transform: translateY(-3px);
}

button.service-btn:active {
    transform: translateY(0);
}

/* --- Неактивная услуга --- */
button.service-btn.unavailable {
    background: #b5b5b5;
    cursor: not-allowed;
    opacity: 0.85;
    transform: none;
}

button.service-btn.unavailable:hover {
    background: #b5b5b5;
    transform: none;
}

/* --- Уведомление --- */
#ticket-notice {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 32px;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    z-index: 999;
}

#ticket-notice span {
    background: var(--notice-bg);
    padding: 25px 50px;
    border-radius: 12px;
    margin-bottom: 20px;
}

#ticket-notice .timer {
    font-size: 22px;
    font-weight: bold;
}

@media print {
    /* Скрываем весь основной интерфейс */
    body > *:not(#print-receipt) {
        display: none !important;
    }

    /* Показываем только чек */
    #print-receipt {
        display: block !important;
        width: 100%;
        margin: 0;
        padding: 0;
    }
}
</style>
</head>

<body>

<h1>Выберите услугу</h1>

<div id="services"></div>

<div id="ticket-notice">
    <span id="ticket-message"></span>
    <div class="timer" id="ticket-timer"></div>
</div>

<script>
const socket = new WebSocket("ws://localhost:8000/ws/terminal");

socket.onmessage = function(event) {
    const data = JSON.parse(event.data);

    if (data.type === "services_updated") {
        loadServices();  // просто перезагружаем список
    }
};


const API_URL = "http://localhost:8000";
const NOTICE_DURATION = 5;

// --- Загрузка услуг ---
async function loadServices() {
    try {
        const res = await fetch(`${API_URL}/services/`);
        const services = await res.json();

        const container = document.getElementById("services");
        container.innerHTML = "";

        services.forEach(service => {
            const btn = document.createElement("button");
            btn.classList.add("service-btn");

            if (service.status === "inactive") {
                btn.textContent = `${service.name} (сейчас не активна)`;
                btn.classList.add("unavailable");

                // вместо блокировки просто показываем уведомление
                btn.onclick = () => {
                    showNotice("В данный момент нет доступных специалистов. Услуга недоступна", 5);
                };
            } else {
                btn.textContent = service.name;
                btn.onclick = () => createTicket(service.id, service.name);
            }

            container.appendChild(btn);
        });

    } catch (error) {
        console.error("Ошибка загрузки услуг:", error);
    }
}

// --- Создание талона ---
async function createTicket(serviceId, serviceName) {
    const buttons = document.querySelectorAll(".service-btn");
    buttons.forEach(b => b.disabled = true);

    try {
        const res = await fetch(`${API_URL}/tickets/`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ service_id: serviceId })
        });

        const ticket = await res.json();

        // СНАЧАЛА проверяем ошибку
        if (!ticket || ticket.error) {
            showNotice("В данный момент нет доступных специалистов", 3);
            return; // Выходим, печать не вызываем
        }
        
		document.getElementById("receipt-number").textContent = ticket.number;
		document.getElementById("receipt-service").textContent = serviceName; // Печатаем имя
		document.getElementById("receipt-date").textContent = new Date().toLocaleString();

		// Вызываем печать
		window.print();
		
        socket.send(JSON.stringify({ type: "queue_updated" }));
        showNotice(`Возьмите ваш талон: ${ticket.number ?? "—"}`, NOTICE_DURATION);

    } catch (e) {
        console.error("Критическая ошибка:", e);
        showNotice("Ошибка системы. Попробуйте позже.", 3);
    } finally {
        // Разблокируем кнопки в любом случае
        buttons.forEach(b => {
            if (!b.classList.contains("unavailable")) {
                b.disabled = false;
            }
        });
    }
}

// --- Показ уведомления ---
function showNotice(message, duration) {
    const notice = document.getElementById("ticket-notice");
    const timerEl = document.getElementById("ticket-timer");

    document.getElementById("ticket-message").textContent = message;

    let remaining = duration;
    timerEl.textContent = remaining;
    notice.style.display = "flex";

    const interval = setInterval(() => {
        remaining--;
        timerEl.textContent = remaining;

        if (remaining <= 0) {
            clearInterval(interval);
            notice.style.display = "none";
        }
    }, 1000);
}
// --- Инициализация ---
loadServices();
</script>

<div id="print-receipt" style="display: none; text-align: center; font-family: sans-serif; padding: 20px;">
    <h1 style="font-size: 32px; margin: 10px 0;">ВАШ ТАЛОН</h1>
    <div id="receipt-number" style="font-size: 80px; font-weight: bold; margin: 20px 0;"></div>
    <h2 id="receipt-service" style="font-size: 28px; margin: 10px 0;"></h2>
    <p id="receipt-date" style="font-size: 18px; margin-top: 30px;"></p>
</div>

</body>
</html>
